<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="UNR Studio is an independent Android developer studio.">
  <title>UNR Studio</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2430;
      --muted: #5f6977;
      --line: #d8dee8;
      --paper: #f8fafc;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), transparent 38%),
        linear-gradient(315deg, rgba(37, 99, 235, 0.07), transparent 42%),
        var(--paper);
      letter-spacing: 0;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .intro {
      width: min(100%, 720px);
    }

    h1 {
      margin: 0;
      max-width: none;
      font-size: clamp(1.6rem, 3.5vw, 2.25rem);
      line-height: 1.15;
      letter-spacing: 0;
      white-space: nowrap;
    }

    p {
      max-width: none;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.4vw, 1.05rem);
      line-height: 1.5;
    }

    .contact-block {
      margin-top: 34px;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.55;
    }

    .contact-label {
      font-weight: 700;
    }

    .contact {
      display: inline-block;
      color: var(--accent-dark);
      font-weight: 600;
      text-decoration: none;
      text-underline-offset: 5px;
    }

    .contact:hover,
    .contact:focus-visible {
      color: var(--accent);
      text-decoration: underline;
    }

    .contact:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.24);
      outline-offset: 6px;
      border-radius: 6px;
    }

    @media (max-width: 560px) {
      main {
        align-items: end;
        padding-bottom: 48px;
      }

      .intro {
        overflow-wrap: anywhere;
      }

      h1 {
        font-size: clamp(1.35rem, 7vw, 1.8rem);
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro" aria-label="UNR Studio introduction">
      <h1>Welcome to UNR Studio</h1>
      <p>Independent Android development focused on simple, useful apps.</p>
      <div class="contact-block">
        <div class="contact-label">Contact:</div>
        <a class="contact" href="mailto:support@unrstudio.com">support@unrstudio.com</a>
      </div>
    </section>
  </main>
</body>
</html>
