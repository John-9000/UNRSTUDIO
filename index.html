<!DOCTYPE html>
<html lang="en">
<head>
  <title>UNR Studio - Independent Android App Development</title>

<meta name="description"
content="UNR Studio builds simple and useful Android apps including BossMeter and TopScore." />

<meta name="keywords"
content="Android apps, Android developer, BossMeter, TopScore, World Cup scores" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UNR Studio builds simple, useful Android apps for Google Play.">
  <title>UNR Studio</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #071124;
      --muted: #41506a;
      --line: #d8e7ef;
      --cyan: #009db8;
      --cyan-dark: #037d96;
      --surface: #ffffff;
      --soft-blue: #eef9ff;
      --soft-gold: #fff8ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f4fbff 0%, #ffffff 42%, #f8fcff 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(4.5rem, 12vw, 7.5rem) 1.25rem clamp(4rem, 10vw, 6.5rem);
      text-align: center;
      isolation: isolate;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      z-index: -1;
      pointer-events: none;
      opacity: 0.8;
    }

    .hero::before {
      inset: 0;
      background:
        linear-gradient(115deg, rgba(55, 178, 215, 0.18), transparent 30%),
        linear-gradient(250deg, rgba(92, 191, 219, 0.16), transparent 34%);
    }

    .hero::after {
      width: min(82rem, 120vw);
      height: min(26rem, 50vw);
      left: 50%;
      bottom: -9rem;
      border: 2px solid rgba(56, 185, 219, 0.2);
      border-bottom: 0;
      border-radius: 50% 50% 0 0;
      transform: translateX(-50%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      margin: 0 0 1.8rem;
      color: var(--cyan-dark);
      font-size: clamp(0.72rem, 2.5vw, 0.9rem);
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: clamp(1.5rem, 8vw, 3rem);
      height: 2px;
      background: #74d5e3;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.65rem, 9vw, 5.4rem);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 0.35rem 1.2rem rgba(7, 17, 36, 0.1);
    }

    .hero-copy {
      max-width: 46rem;
      margin: 1.65rem auto 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 3.8vw, 1.55rem);
      line-height: 1.45;
      text-wrap: balance;
    }

    .apps-section {
      position: relative;
      margin-top: -1.5rem;
      padding: clamp(3rem, 9vw, 4.75rem) 1rem clamp(3.75rem, 10vw, 6.5rem);
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid rgba(216, 231, 239, 0.8);
      box-shadow: 0 -1rem 3rem rgba(27, 102, 132, 0.08);
    }

    .section-inner {
      width: min(58rem, 100%);
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .title-rule {
      width: 4.5rem;
      height: 3px;
      margin: 1rem auto 0;
      background: var(--cyan);
      border-radius: 999px;
    }

    .app-list {
      display: grid;
      gap: 1.25rem;
      margin-top: clamp(2rem, 7vw, 3.25rem);
    }

    .app-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: clamp(1rem, 4vw, 2rem);
      min-height: 15rem;
      padding: clamp(1.25rem, 5vw, 2rem);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 1rem 2.8rem rgba(24, 61, 91, 0.08);
    }

    .app-card::after {
      content: "";
      position: absolute;
      right: -4.5rem;
      top: 50%;
      width: 17rem;
      height: 17rem;
      border: 2rem solid rgba(255, 255, 255, 0.5);
      border-radius: 22%;
      transform: translateY(-50%) rotate(18deg);
      pointer-events: none;
    }

    .app-card.topscore {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(232, 248, 255, 0.92)),
        var(--soft-blue);
    }

    .app-card.bossmeter {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 246, 232, 0.94)),
        var(--soft-gold);
    }

    .app-icon {
      position: relative;
      z-index: 1;
      width: clamp(5.5rem, 21vw, 8.5rem);
      aspect-ratio: 1;
      border-radius: 24%;
      object-fit: cover;
      box-shadow: 0 1rem 2.25rem rgba(15, 23, 42, 0.18);
    }

    .app-content {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .app-content h3 {
      font-size: clamp(2rem, 7vw, 2.7rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .app-content p {
      max-width: 28rem;
      margin-top: 1rem;
      color: var(--muted);
      font-size: clamp(1rem, 3.8vw, 1.22rem);
      line-height: 1.55;
    }

    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 0.72rem;
      min-height: 3.6rem;
      margin-top: 1.75rem;
      padding: 0.58rem 1rem;
      color: #ffffff;
      text-decoration: none;
      background: #071124;
      border-radius: 8px;
      box-shadow: 0 0.8rem 1.6rem rgba(7, 17, 36, 0.18);
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .store-link:hover,
    .store-link:focus-visible {
      background: #132037;
      transform: translateY(-2px);
    }

    .play-icon {
      width: 2rem;
      height: 2rem;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .store-text {
      display: grid;
      gap: 0.12rem;
      text-align: left;
      white-space: nowrap;
    }

    .store-kicker {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .store-name {
      font-size: 1.25rem;
      line-height: 1;
      font-weight: 800;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 2rem 1rem;
      text-align: center;
      background: #ffffff;
    }

    footer p {
      color: #5c6a80;
      font-size: 0.95rem;
      font-weight: 600;
    }

    footer a {
      color: var(--cyan-dark);
      font-weight: 800;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .hero {
        padding-top: 3.75rem;
      }

      .eyebrow {
        flex-direction: column;
        gap: 0.55rem;
        letter-spacing: 0.16em;
      }

      .eyebrow::before {
        display: none;
      }

      .app-card {
        grid-template-columns: 1fr;
        min-height: auto;
        text-align: center;
      }

      .app-card::after {
        right: -7rem;
        top: 1rem;
        width: 12rem;
        height: 12rem;
        transform: rotate(18deg);
      }

      .app-icon {
        margin: 0 auto;
      }

      .app-content p {
        margin-left: auto;
        margin-right: auto;
      }
    }

    @media (max-width: 380px) {
      .store-link {
        width: 100%;
        justify-content: center;
      }

      .store-name {
        font-size: 1.08rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
     
      <h1>Welcome to UNR Studio</h1>
      <p class="hero-copy">Simple, useful apps built for everyday Android moments.</p>
    </section>

    <section id="apps" class="apps-section">
      <div class="section-inner">
        <h2 class="section-title">Our Apps</h2>
        <div class="title-rule" aria-hidden="true"></div>

        <div class="app-list">
          <article class="app-card topscore">
            <img class="app-icon" src="assets/topscore-icon.png" alt="TopScore app icon">
            <div class="app-content">
              <h3>TopScore</h3>
              <p>World Cup 2026: match results, live scores, result predictions</p>
              <a class="store-link" href="https://play.google.com/store/apps/details?id=com.unrstudio.topscore" target="_blank" rel="noopener noreferrer" aria-label="Get TopScore on Google Play">
                <img class="play-icon" src="assets/google-play-icon.png" alt="" aria-hidden="true">
                <span class="store-text">
                  <span class="store-kicker">Get it on</span>
                  <span class="store-name">Google Play</span>
                </span>
              </a>
            </div>
          </article>

          <article class="app-card bossmeter">
            <img class="app-icon" src="assets/bossmeter-icon.png" alt="BossMeter app icon">
            <div class="app-content">
              <h3>BossMeter</h3>
              <p>Check your Boss level</p>
              <a class="store-link" href="https://play.google.com/store/apps/details?id=uk.co.bossdeboss.bossmeter" target="_blank" rel="noopener noreferrer" aria-label="Get BossMeter on Google Play">
                <img class="play-icon" src="assets/google-play-icon.png" alt="" aria-hidden="true">
                <span class="store-text">
                  <span class="store-kicker">Get it on</span>
                  <span class="store-name">Google Play</span>
                </span>
              </a>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>
      Contact:
      <a href="mailto:support@unrstudio.com">support@unrstudio.com</a>
    </p>
  </footer>
</body>
</html>
